services:
  cog-api:
    build:
      context: .
      dockerfile: Dockerfile.cog
    ports:
      - "5001:5000"
    environment:
      - COG_PREDICT_TYPE_STUB=predict.py:Predictor

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - API_URL=http://cog-api:5000/predictions
    depends_on:
      - cog-api
